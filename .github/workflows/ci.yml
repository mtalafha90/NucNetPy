name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Test
        run: python -m pytest
      - name: CLI smoke test
        run: |
          nucnetpy summary notebooks/data/toy_alpha_network.xml
          nucnetpy nse tests/golden/golden_network.xml --t9 5 --rho 1e8 --ye 0.5 | head -1
